<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="fragment/_layout">

<head>
    <meta charset="UTF-8">
    <title>Product List</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>

<body>

<div layout:fragment="content" class="container">

    <div class="d-flex justify-content-between align-items-center mb-3">
        <h2>Product List</h2>
        <div>
            <a th:href="@{/cart}" class="btn btn-outline-success me-2">
                <i class="bi bi-cart"></i> Giỏ hàng
            </a>
            <a th:href="@{/products/add}" class="btn btn-primary">
                Create New Product
            </a>
        </div>
    </div>

    <!-- Form tìm kiếm, lọc và sắp xếp -->
    <div class="row mb-3">

        <!-- Dropdown lọc theo category -->
        <div class="col-md-3">
            <form th:action="@{/products}" method="get" class="d-flex">
                <select name="categoryId" class="form-select me-2" onchange="this.form.submit()">
                    <option value="">All Categories</option>
                    <option th:each="cat : ${categories}"
                            th:value="${cat.id}"
                            th:text="${cat.name}"
                            th:selected="${selectedCategoryId != null and selectedCategoryId == cat.id}">
                    </option>
                </select>
                <input type="hidden" name="sortField" th:value="${sortField}">
                <input type="hidden" name="sortDir" th:value="${sortDir}">
                <input type="hidden" name="page" value="0">
            </form>
        </div>

        <!-- Nút sắp xếp theo giá -->
        <div class="col-md-5 text-end">
            <div class="btn-group" role="group">
                <a th:href="@{${currentUrl}(page=0, size=${products.size}, sortField='price', sortDir='asc', key=${param.key}, categoryId=${selectedCategoryId})}"
                   class="btn btn-outline-secondary"
                   th:classappend="${sortField == 'price' and sortDir == 'asc'} ? 'active'">
                    <i class="bi bi-arrow-up"></i> Giá tăng dần
                </a>
                <a th:href="@{${currentUrl}(page=0, size=${products.size}, sortField='price', sortDir='desc', key=${param.key}, categoryId=${selectedCategoryId})}"
                   class="btn btn-outline-secondary"
                   th:classappend="${sortField == 'price' and sortDir == 'desc'} ? 'active'">
                    <i class="bi bi-arrow-down"></i> Giá giảm dần
                </a>
            </div>
        </div>
    </div>

    <div th:if="${error}" class="alert alert-danger">
        <span th:text="${error}"></span>
    </div>

    <table class="table table-striped table-bordered align-middle">
        <thead class="table-dark">
        <th>
            <a th:href="@{${currentUrl}(page=0, size=${products.size}, sortField='id', sortDir=${reverseSortDir}, key=${param.key}, categoryId=${selectedCategoryId})}"
               class="text-white text-decoration-none">
                # <span th:if="${sortField == 'id' and sortDir == 'asc'}">↑</span>
                <span th:if="${sortField == 'id' and sortDir == 'desc'}">↓</span>
            </a>
        </th>
        <th>
            <a th:href="@{${currentUrl}(page=0, size=${products.size}, sortField='name', sortDir=${reverseSortDir}, key=${param.key}, categoryId=${selectedCategoryId})}"
               class="text-white text-decoration-none">
                Name <span th:if="${sortField == 'name' and sortDir == 'asc'}">↑</span>
                <span th:if="${sortField == 'name' and sortDir == 'desc'}">↓</span>
            </a>
        </th>
        <th>
            <a th:href="@{${currentUrl}(page=0, size=${products.size}, sortField='price', sortDir=${reverseSortDir}, key=${param.key}, categoryId=${selectedCategoryId})}"
               class="text-white text-decoration-none">
                Price <span th:if="${sortField == 'price' and sortDir == 'asc'}">↑</span>
                <span th:if="${sortField == 'price' and sortDir == 'desc'}">↓</span>
            </a>
        </th>
        <th>Image</th>
        <th>Category</th>
        <th style="width: 220px;">Action</th>
        </tr>
        </thead>

        <tbody>
        <tr th:each="product : ${products.content}">
            <td th:text="${product.id}">\(</td>
            <td th:text="${product.name}">\)</td>
            <td th:text="${#numbers.formatDecimal(product.price, 0, 'COMMA', 0, 'POINT')}">\(</td>
            <td>
                <img th:if="${product.image != null and product.image != ''}"
                     th:src="${product.image}"
                     width="80"
                     class="img-thumbnail">
                <span th:if="${product.image == null or product.image == ''}">No image</span>
            </td>
            <td th:text="${product.category != null ? product.category.name : 'N/A'}">\(</td>
            <td>
                <!-- Nút Add to Cart -->
                <form th:action="@{/cart/add/{id}(id=${product.id})}"
                      method="post"
                      style="display:inline">
                    <button type="submit" class="btn btn-sm btn-success">
                        <i class="bi bi-cart-plus"></i> Add to Cart
                    </button>
                </form>

                <a th:href="@{/products/detail/{id}(id=${product.id})}"
                   class="btn btn-sm btn-info">
                    <i class="bi bi-eye"></i>
                </a>

                <!-- Edit -->
                <a th:href="@{/products/edit/{id}(id=${product.id})}"
                   class="btn btn-sm btn-secondary">
                    <i class="bi bi-pencil"></i> Edit
                </a>

                <!-- Delete -->
                <form th:action="@{/products/delete/{id}(id=${product.id})}"
                      method="post"
                      style="display:inline"
                      onsubmit="return confirm('Are you sure you want to delete this product?');">
                    <button type="submit" class="btn btn-sm btn-danger">
                        <i class="bi bi-trash"></i> Delete
                    </button>
                </form>
            </td>
        </tr>
        </tbody>
    </table>

    <!-- Phân trang -->
    <nav th:if="${totalPages > 0}" aria-label="Page navigation">
        <ul class="pagination justify-content-center">
            <li class="page-item" th:classappend="${currentPage == 0} ? 'disabled'">
                <a class="page-link"
                   th:href="@{${currentUrl}(page=${currentPage - 1}, size=${products.size}, sortField=${sortField}, sortDir=${sortDir}, key=${param.key}, categoryId=${selectedCategoryId})}">
                    &laquo;
                </a>
            </li>
            <li th:each="i : ${#numbers.sequence(0, totalPages - 1)}"
                class="page-item" th:classappend="${currentPage == i} ? 'active'">
                <a class="page-link"
                   th:href="@{${currentUrl}(page=${i}, size=${products.size}, sortField=${sortField}, sortDir=${sortDir}, key=${param.key}, categoryId=${selectedCategoryId})}"
                   th:text="${i + 1}"></a>
            </li>
            <li class="page-item" th:classappend="${currentPage == totalPages - 1} ? 'disabled'">
                <a class="page-link"
                   th:href="@{${currentUrl}(page=${currentPage + 1}, size=${products.size}, sortField=${sortField}, sortDir=${sortDir}, key=${param.key}, categoryId=${selectedCategoryId})}">
                    &raquo;
                </a>
            </li>
        </ul>
    </nav>

    <!-- Thông tin -->
    <div th:if="${totalPages > 0}" class="text-center text-muted mt-2">
        <small>
            Page <span th:text="${currentPage + 1}"></span> of <span th:text="${totalPages}"></span> |
            Total items: <span th:text="${totalElements}"></span> |
            Sorting by: <span th:text="${sortField}"></span>
            <span th:if="${sortDir == 'asc'}">(Ascending)</span>
            <span th:if="${sortDir == 'desc'}">(Descending)</span>
            <span th:if="${selectedCategoryId != null}"> | Filtered by category</span>
        </small>
    </div>

</div>

</body>
</html>
