<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="fragment/_layout">

<head>
  <meta charset="UTF-8">
  <title th:text="${product.name} + ' - Product Details'">Product Details</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>

<body>

<div layout:fragment="content" class="container py-4">

  <!-- Breadcrumb -->
  <nav aria-label="breadcrumb">
    <ol class="breadcrumb">
      <li class="breadcrumb-item"><a th:href="@{/products}">Home</a></li>
      <li class="breadcrumb-item active" th:text="${product.category.name}">Category</li>
      <li class="breadcrumb-item active" th:text="${product.name}">Product</li>
    </ol>
  </nav>

  <!-- Product Detail -->
  <div class="row">
    <!-- Product Image -->
    <div class="col-md-5">
      <div class="card">
        <img th:if="${product.image != null and product.image != ''}"
             th:src="${product.image}"
             class="card-img-top img-fluid"
             alt="Product Image"
             style="object-fit: cover; height: 400px;">
        <div th:unless="${product.image != null and product.image != ''}"
             class="card-body text-center text-muted">
          <i class="bi bi-image" style="font-size: 100px;"></i>
          <p>No image available</p>
        </div>
      </div>
    </div>

    <!-- Product Info -->
    <div class="col-md-7">
      <h1 th:text="${product.name}" class="mb-3"></h1>

      <div class="mb-3">
        <span class="badge bg-secondary" th:text="${product.category.name}"></span>
      </div>

      <h2 class="text-danger mb-4">
        <span th:text="${#numbers.formatDecimal(product.price, 0, 'COMMA', 0, 'POINT')}"></span> ₫
      </h2>

      <div class="mb-4">
        <h5>Product Description</h5>
        <p class="text-muted">Lorem ipsum dolor sit amet, consectetur adipiscing elit.
          Sed do eiusmod tempor incididunt ut labore et dolore magna aliqua.</p>
      </div>

      <!-- Add to Cart Form -->
      <form th:action="@{/cart/add/{id}(id=${product.id})}" method="post" class="mt-4">
        <div class="row g-3">
          <div class="col-auto">
            <label class="form-label">Quantity:</label>
            <input type="number"
                   name="quantity"
                   value="1"
                   min="1"
                   max="99"
                   class="form-control"
                   style="width: 80px;">
          </div>
          <div class="col-auto">
            <button type="submit" class="btn btn-success btn-lg">
              <i class="bi bi-cart-plus"></i> Add to Cart
            </button>
          </div>
          <div class="col-auto">
            <a th:href="@{/products}" class="btn btn-outline-secondary btn-lg">
              <i class="bi bi-arrow-left"></i> Continue Shopping
            </a>
          </div>
        </div>
      </form>
    </div>
  </div>

  <!-- Related Products -->
  <div th:if="${not #lists.isEmpty(relatedProducts)}" class="mt-5">
    <hr>
    <h3 class="mb-4">Related Products</h3>
    <div class="row">
      <div th:each="relProduct : ${relatedProducts}" class="col-md-3 mb-4">
        <div class="card h-100">
          <img th:if="${relProduct.image != null and relProduct.image != ''}"
               th:src="${relProduct.image}"
               class="card-img-top"
               style="height: 150px; object-fit: cover;"
               alt="Product">
          <div class="card-body">
            <h6 class="card-title" th:text="${relProduct.name}"></h6>
            <p class="card-text text-danger fw-bold">
              <span th:text="${#numbers.formatDecimal(relProduct.price, 0, 'COMMA', 0, 'POINT')}"></span> ₫
            </p>
            <a th:href="@{/products/detail/{id}(id=${relProduct.id})}"
               class="btn btn-sm btn-outline-primary">
              View Details
            </a>
          </div>
        </div>
      </div>
    </div>
  </div>

</div>

</body>
</html>
