<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="fragment/_layout">

<head>
    <meta charset="UTF-8">
    <title>Checkout</title>
</head>

<body>

<div layout:fragment="content" class="container">
    <h1>Checkout</h1>

    <div class="row">
        <!-- Thông tin giỏ hàng -->
        <div class="col-md-5">
            <h4>Your Cart</h4>
            <table class="table table-sm">
                <thead>
                <tr><th>Product</th><th>Qty</th><th>Price</th></tr>
                </thead>
                <tbody>
                <tr th:each="item : ${cartItems}">
                    <td th:text="${item.name}"></td>
                    <td th:text="${item.quantity}"></td>
                    <td th:text="${#numbers.formatDecimal(item.price, 0, 'COMMA', 0, 'POINT')}"></td>
                </tr>
                </tbody>
                <tfoot>
                <tr><th colspan="2">Total:</th>
                    <th th:text="${#numbers.formatDecimal(total, 0, 'COMMA', 0, 'POINT')}"></th>
                </tr>
                </tfoot>
            </table>
        </div>

        <!-- Form thông tin khách hàng -->
        <div class="col-md-7">
            <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

            <form th:action="@{/order/checkout}" method="post">
                <div class="mb-3">
                    <label class="form-label">Full Name</label>
                    <input type="text" name="customerName" class="form-control" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">Email</label>
                    <input type="email" name="customerEmail" class="form-control" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">Phone</label>
                    <input type="tel" name="customerPhone" class="form-control" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">Shipping Address</label>
                    <textarea name="shippingAddress" class="form-control" rows="3" required></textarea>
                </div>
                <button type="submit" class="btn btn-success">Place Order</button>
                <a th:href="@{/cart}" class="btn btn-secondary">Back to Cart</a>
            </form>
        </div>
    </div>
</div>

</body>
</html>
