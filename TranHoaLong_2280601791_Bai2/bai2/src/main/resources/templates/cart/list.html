<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="fragment/_layout">

<head>
    <meta charset="UTF-8">
    <title>Giỏ hàng của bạn</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>

<body>

<div layout:fragment="content" class="container body-content">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h1><i class="bi bi-cart"></i> Giỏ hàng của bạn</h1>
        <a th:href="@{/products}" class="btn btn-outline-primary">
            <i class="bi bi-arrow-left"></i> Tiếp tục mua sắm
        </a>
    </div>

    <div th:if="${cartItems.isEmpty()}" class="alert alert-info">
        <i class="bi bi-cart-x"></i> Giỏ hàng của bạn đang trống.
        <a th:href="@{/products}">Tiếp tục mua sắm</a>
    </div>

    <div th:unless="${cartItems.isEmpty()}">
        <div class="table-responsive">
            <table class="table table-striped table-bordered align-middle">
                <thead class="table-dark">
                <tr>
                    <th>Tên sản phẩm</th>
                    <th>Hình ảnh</th>
                    <th>Giá</th>
                    <th style="width: 180px;">Số lượng</th>
                    <th>Thành tiền</th>
                    <th style="width: 100px;">Hành động</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="item : ${cartItems}">
                    <td th:text="${item.name}" class="fw-bold"></td>
                    <td>
                        <img th:if="${item.image != null and item.image != ''}"
                             th:src="${item.image}"
                             width="80"
                             height="80"
                             class="img-thumbnail"
                             style="object-fit: cover;">
                        <span th:unless="${item.image != null and item.image != ''}" class="text-muted">
                            <i class="bi bi-image"></i> No image
                        </span>
                    </td>
                    <td class="text-end">
                        <span th:text="${#numbers.formatDecimal(item.price, 0, 'COMMA', 0, 'POINT')}"></span> ₫
                    </td>
                    <td>
                        <form th:action="@{/cart/update}" method="post" class="d-flex gap-2">
                            <input type="hidden" name="productId" th:value="${item.id}" />
                            <input type="number" name="quantity"
                                   th:value="${item.quantity}"
                                   min="1"
                                   max="99"
                                   class="form-control form-control-sm text-center"
                                   style="width: 80px;" />
                            <button type="submit" class="btn btn-sm btn-outline-secondary">
                                <i class="bi bi-arrow-repeat"></i> Cập nhật
                            </button>
                        </form>
                    </td>
                    <td class="text-end text-danger fw-bold">
                        <span th:text="${#numbers.formatDecimal(item.price * item.quantity, 0, 'COMMA', 0, 'POINT')}"></span> ₫
                    </td>
                    <td class="text-center">
                        <a th:href="@{/cart/remove/{id}(id=${item.id})}"
                           class="btn btn-sm btn-outline-danger"
                           onclick="return confirm('Bạn có chắc muốn xóa sản phẩm này?');">
                            <i class="bi bi-trash"></i> Xóa
                        </a>
                    </td>
                </tr>
                </tbody>
                <tfoot class="table-light">
                <tr>
                    <td colspan="4" class="text-end fw-bold fs-5">Tổng cộng:</td>
                    <td colspan="2">
                        <div class="d-flex justify-content-between align-items-center">
                            <h3 class="text-danger mb-0">
                                <span th:text="${#numbers.formatDecimal(total, 0, 'COMMA', 0, 'POINT')}"></span> ₫
                            </h3>
                            <!-- ĐÃ SỬA: Chuyển hướng đến /order/checkout thay vì /cart/order -->
                            <a th:href="@{/order/checkout}" class="btn btn-success btn-lg">
                                <i class="bi bi-check-circle"></i> Đặt hàng
                            </a>
                        </div>
                    </td>
                </tr>
                <tr>
                    <td colspan="6" class="text-end">
                        <a th:href="@{/cart/clear}"
                           class="btn btn-warning btn-sm"
                           onclick="return confirm('Bạn có chắc muốn xóa toàn bộ giỏ hàng?');">
                            <i class="bi bi-trash3"></i> Xóa tất cả
                        </a>
                    </td>
                </tr>
                </tfoot>
            </table>
        </div>
    </div>
</div>

</body>
</html>
